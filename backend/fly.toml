# Fly.io — API Facturo (Laravel)
# Deploy: cd backend && fly deploy

app = 'facturo-api'
primary_region = 'cdg'

[build]
  dockerfile = 'Dockerfile'

[env]
  APP_NAME = 'Facturo'
  APP_ENV = 'production'
  APP_DEBUG = 'false'
  LOG_CHANNEL = 'stderr'
  DB_CONNECTION = 'pgsql'
  SESSION_DRIVER = 'database'
  CACHE_STORE = 'database'
  QUEUE_CONNECTION = 'sync'
  BILLING_MODE = 'simulation'
  FRONTEND_URL = 'https://saas-facturation.vercel.app'
  CORS_ALLOWED_ORIGINS = 'https://saas-facturation.vercel.app'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
